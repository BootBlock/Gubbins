  /api/v1/capabilities:
    get:
      tags:
      - "capabilities"
      summary: "Browse the queryable capability vocabulary (paginated)"
      description: "The distinct capability keys across active inventory, busiest first — the keys you can filter on with cap:<key> in a search query."
