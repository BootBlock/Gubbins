        schema:
          type: "integer"
          minimum: 0
          default: 0
      responses:
        "200":
          description: "A page of results."
          content:
            application/json:
              schema:
                type: "object"
                required:
                - "data"
                - "pagination"
                properties:
                  data:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/CapabilityKey"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: "Snapshot not loaded yet."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      description: "The shared GUBBINS_BRIDGE_TOKEN, sent as \"Authorization: Bearer <token>\"."
  schemas:
    Error:
      type: "object"
      required:
      - "error"
      properties:
        error:
          type: "object"
          required:
          - "code"
          - "message"
          properties:
            code:
              type: "string"
              enum:
              - "bad_request"
              - "unauthorized"
              - "not_found"
              - "method_not_allowed"
              - "too_many_requests"
              - "snapshot_unavailable"
              - "unprocessable"
              - "payload_too_large"
              - "internal_error"
            message:
              type: "string"
    Pagination:
      type: "object"
      required:
      - "limit"
      - "offset"
      - "count"
      - "hasMore"
      properties:
        limit:
          type: "integer"
          description: "Effective page size after clamping."
        offset:
          type: "integer"
          description: "Zero-based offset of the first row."
        count:
          type: "integer"
          description: "Rows returned in this page (≤ limit)."
        hasMore:
          type: "boolean"
          description: "True when a further page may exist."
    ApiIndex:
      type: "object"
      properties:
        name:
          type: "string"
          example: "Gubbins Bridge API"
        version:
          type: "string"
          example: "1.0.0"
        openapi:
          type: "string"
          example: "/api/v1/openapi.json"
        writable:
          type: "boolean"
          description: "Whether the opt-in write endpoints are enabled."
        pushable:
          type: "boolean"
          description: "Whether the opt-in snapshot-ingest endpoint is enabled."
        endpoints:
          type: "array"
          items:
            type: "string"
    SnapshotAccepted:
      type: "object"
      required:
      - "ok"
      - "formatVersion"
      - "generatedAt"
      properties:
        ok:
          type: "boolean"
          example: true
        formatVersion:
          type: "integer"
          example: 3
        generatedAt:
          type: "integer"
          description: "UNIX-ms."
          example: 1751004800000
    Health:
      type: "object"
      required:
      - "ok"
      - "itemCount"
      - "snapshotGeneratedAt"
      properties:
        ok:
          type: "boolean"
        itemCount:
          type: "integer"
        snapshotGeneratedAt:
          type: "string"
          nullable: true
          format: "date-time"
    ItemMatch:
      type: "object"
      required:
      - "id"
      - "name"
      - "quantity"
      - "locationName"
      - "mpn"
      - "manufacturer"
      properties:
        id:
          type: "string"
          example: "item-esp32"
        name:
          type: "string"
          example: "ESP32 Dev Board"
        quantity:
          type: "integer"
          example: 7
        locationName:
          type: "string"
          nullable: true
          example: "Shelf 2"
        mpn:
          type: "string"
          nullable: true
          example: "DEV-ESP32"
        manufacturer:
          type: "string"
          nullable: true
          example: "Synthetic Silicon Co"
    SearchResult:
      type: "object"
      required:
      - "query"
      - "matches"
      properties:
        query:
          type: "string"
          example: "ESP32"
        matches:
          type: "array"
          items:
            $ref: "#/components/schemas/ItemMatch"
    Placement:
      type: "object"
      required:
      - "locationId"
      - "locationName"
      - "quantity"
      properties:
        locationId:
          type: "string"
          example: "loc-shelf-2"
        locationName:
          type: "string"
          example: "Shelf 2"
        quantity:
          type: "integer"
          example: 5
    WhereIsMatch:
      allOf:
      -
        $ref: "#/components/schemas/ItemMatch"
      -
        type: "object"
        required:
        - "placements"
        properties:
          placements:
            type: "array"
            items:
              $ref: "#/components/schemas/Placement"
    WhereIsResult:
      type: "object"
      required:
      - "query"
      - "matches"
      - "spoken"
      properties:
        query:
          type: "string"
          example: "ESP32"
        matches:
          type: "array"
          items:
            $ref: "#/components/schemas/WhereIsMatch"
        spoken:
          type: "string"
          example: "Your ESP32 Dev Board is spread across 2 locations: 5 on Shelf 2 and 2 in Bin 4 — 7 in total."
    Capability:
      type: "object"
      required:
      - "key"
      - "valueNum"
      - "valueText"
      - "weight"
      properties:
        key:
          type: "string"
          example: "voltage"
        valueNum:
          type: "number"
          nullable: true
          example: 3.3
        valueText:
          type: "string"
          nullable: true
          example: null
        weight:
          type: "number"
          example: 2
    ItemSummary:
      type: "object"
      required:
      - "id"
      - "name"
      - "quantity"
      - "locationId"
      - "locationName"
      - "categoryId"
      - "mpn"
      - "manufacturer"
      - "trackingMode"
      - "isActive"
      properties:
        id:
          type: "string"
          example: "item-m3-bolt"
        name:
          type: "string"
          example: "M3 x 10 Hex Bolt"
        quantity:
          type: "integer"
          example: 42
        locationId:
          type: "string"
          example: "loc-drawer-a"
        locationName:
          type: "string"
          nullable: true
          example: "Drawer A"
        categoryId:
          type: "string"
          nullable: true
          example: "cat-fasteners"
        mpn:
          type: "string"
          nullable: true
          example: "FAS-M3-10"
        manufacturer:
          type: "string"
          nullable: true
          example: "Acme Fasteners"
        trackingMode:
          type: "string"
          enum:
          - "DISCRETE"
          - "SERIALISED"
          - "CONSUMABLE_GAUGE"
          - "UNTRACKED"
          example: "DISCRETE"
        isActive:
          type: "boolean"
          example: true
    ItemDetail:
      allOf:
      -
        $ref: "#/components/schemas/ItemSummary"
      -
        type: "object"
        required:
        - "placements"
        - "capabilities"
        properties:
          description:
            type: "string"
            nullable: true
          categoryName:
            type: "string"
            nullable: true
            example: "Fasteners"
          unitCost:
            type: "number"
            nullable: true
          condition:
            type: "string"
            nullable: true
          serialNo:
            type: "integer"
            nullable: true
          parentId:
            type: "string"
            nullable: true
          expiryDate:
            type: "integer"
            nullable: true
          batchNumber:
            type: "string"
            nullable: true
          lotNumber:
            type: "string"
            nullable: true
          createdAt:
            type: "integer"
          updatedAt:
            type: "integer"
          placements:
            type: "array"
            items:
              $ref: "#/components/schemas/Placement"
          capabilities:
            type: "array"
            items:
              $ref: "#/components/schemas/Capability"
    Location:
      type: "object"
      required:
      - "id"
      - "name"
      - "parentId"
      - "isSystem"
      - "description"
      - "color"
      - "itemCount"
      properties:
        id:
          type: "string"
          example: "loc-drawer-a"
        name:
          type: "string"
          example: "Drawer A"
        parentId:
          type: "string"
          nullable: true
          example: null
        isSystem:
          type: "boolean"
          example: false
        description:
          type: "string"
          nullable: true
        color:
          type: "string"
          nullable: true
        itemCount:
          type: "integer"
          example: 2
    CategoryField:
      type: "object"
      required:
      - "id"
      - "name"
      - "fieldType"
      - "options"
      - "isRequired"
      - "defaultValue"
      - "position"
      properties:
        id:
          type: "string"
        name:
          type: "string"
          example: "Voltage"
        fieldType:
          type: "string"
          example: "TEXT"
        options:
          type: "array"
          items:
            type: "string"
          nullable: true
        isRequired:
          type: "boolean"
        defaultValue:
          type: "string"
          nullable: true
        position:
          type: "integer"
    CategorySummary:
      type: "object"
      required:
      - "id"
      - "name"
      - "fieldCount"
      properties:
        id:
          type: "string"
          example: "cat-electronics"
        name:
          type: "string"
          example: "Electronics"
        fieldCount:
          type: "integer"
          example: 0
    CategoryDetail:
      type: "object"
      required:
      - "id"
      - "name"
      - "fields"
      properties:
        id:
          type: "string"
          example: "cat-electronics"
        name:
          type: "string"
          example: "Electronics"
        fields:
          type: "array"
          items:
            $ref: "#/components/schemas/CategoryField"
    CapabilityKey:
      type: "object"
      required:
      - "key"
      - "itemCount"
      - "hasNumericValues"
      - "hasTextValues"
      properties:
        key:
          type: "string"
          example: "voltage"
        itemCount:
          type: "integer"
          example: 1
        hasNumericValues:
          type: "boolean"
          example: true
        hasTextValues:
          type: "boolean"
          example: false
