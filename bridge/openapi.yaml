  /api/v1/items/{id}/adjust-quantity:
    post:
      tags:
      - "writes"
      summary: "Adjust a DISCRETE item’s quantity by a signed delta (check-in / check-out)"
      description: "Opt-in (GUBBINS_BRIDGE_ALLOW_WRITES=on); returns 404 when writes are disabled. Applies a signed delta to the item’s home-location stock and logs it, exactly as the app does, then writes the merged snapshot back so the PWA reconciles it (LWW) on its next sync."
      parameters:
      -
        name: "id"
        in: "path"
        required: true
        description: "The item id."
        schema:
          type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required:
              - "delta"
              properties:
                delta:
                  type: "number"
                  description: "Whole-number change; negative to check out."
                  example: -1
                note:
                  type: "string"
                  nullable: true
                  maxLength: 500
                  description: "Optional note recorded in the activity log."
      responses:
        "200":
          description: "The updated item."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDetail"
        "400":
          description: "Bad request — missing or invalid parameter."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Resource not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: "The request was well-formed but rejected (e.g. quantity below zero, the wrong tracking mode, or a snapshot from a newer Gubbins build)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: "Snapshot not loaded yet."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/items/{id}/adjust-gauge:
    post:
      tags:
      - "writes"
      summary: "Adjust a CONSUMABLE_GAUGE item’s net value by a signed delta"
      description: "Opt-in (GUBBINS_BRIDGE_ALLOW_WRITES=on); returns 404 when writes are disabled. Applies a signed delta to the gauge’s current net value (clamped to [0, capacity]) and records it as a net-value delta, which the PWA replays through the §7.3 Delta-CRDT on its next sync."
      parameters:
      -
        name: "id"
        in: "path"
        required: true
        description: "The item id."
        schema:
          type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required:
              - "delta"
              properties:
                delta:
                  type: "number"
                  description: "Signed change to the net value (e.g. -45 for 45 consumed)."
                  example: -1
                note:
                  type: "string"
                  nullable: true
                  maxLength: 500
                  description: "Optional note recorded in the activity log."
      responses:
        "200":
          description: "The updated item."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDetail"
        "400":
          description: "Bad request — missing or invalid parameter."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Resource not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: "The request was well-formed but rejected (e.g. quantity below zero, the wrong tracking mode, or a snapshot from a newer Gubbins build)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: "Snapshot not loaded yet."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/snapshot:
    post:
      tags:
      - "push"
      summary: "Replace the served snapshot (the PWA \"push to bridge\")"
      description: "Opt-in (GUBBINS_BRIDGE_ALLOW_PUSH=on, JSON source only); returns 404 when push is disabled or the source is a raw .sqlite. Accepts the same versioned backup JSON the PWA writes to a synced folder, validates it with the format-version guard, and writes it to the snapshot path atomically. The watcher then re-hydrates it through the normal path, so subsequent reads reflect the pushed data. The body is capped at GUBBINS_BRIDGE_MAX_PUSH_BYTES (default 64 MiB)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              description: "A Gubbins versioned backup/sync snapshot (the bytes produced by the PWA’s snapshotToBackupJson). At minimum it carries a numeric formatVersion."
              required:
              - "formatVersion"
              properties:
                formatVersion:
                  type: "integer"
                  example: 3
                generatedAt:
                  type: "integer"
                  description: "UNIX-ms."
                  example: 1751004800000
      responses:
        "200":
          description: "The snapshot was accepted and published."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotAccepted"
              example:
                ok: true
                formatVersion: 3
                generatedAt: 1751004800000
        "400":
          description: "Bad request — missing or invalid parameter."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: "The pushed snapshot exceeded the configured maximum size (GUBBINS_BRIDGE_MAX_PUSH_BYTES)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: "The request was well-formed but rejected (e.g. quantity below zero, the wrong tracking mode, or a snapshot from a newer Gubbins build)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/locations:
