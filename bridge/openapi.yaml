          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Resource not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
