openapi: "3.0.3"
info:
  title: "Gubbins Bridge API"
  version: "1.0.0"
  description: "Read-only HTTP API over a Gubbins inventory snapshot, served by the local companion bridge. Every endpoint is GET-only and requires a bearer token. The unversioned paths (/health, /search, /where) are permanent, stable aliases of their /api/v1 equivalents, kept so existing consumers (the Home Assistant integration) keep working unchanged."
  license:
    name: "MIT"
servers:
-
  url: "http://127.0.0.1:8787"
  description: "Local bridge (loopback default)."
security:
-
  bearerAuth: []
tags:
-
  name: "meta"
  description: "Liveness and API description."
-
  name: "search"
  description: "Relevance search and \"where is X?\"."
-
  name: "items"
  description: "Browse items and look one up by id."
-
  name: "locations"
  description: "Browse the locations hierarchy."
-
  name: "categories"
  description: "Browse categories and their custom-field schema."
-
  name: "capabilities"
  description: "Browse the queryable capability vocabulary."
-
  name: "writes"
  description: "Opt-in stock mutations (off by default; enabled with GUBBINS_BRIDGE_ALLOW_WRITES=on). Each write round-trips through the same sync merge the PWA uses, so it is applied without drift on the next sync. When writes are disabled these paths return 404."
-
  name: "push"
  description: "Opt-in snapshot ingest — the PWA \"push to bridge\" (off by default; enabled with GUBBINS_BRIDGE_ALLOW_PUSH=on, and only for a JSON snapshot source). Accepts the same versioned backup JSON the bridge reads from a synced folder and replaces it atomically; the watcher then re-hydrates. When push is disabled this path returns 404."
paths:
  /api/v1:
    get:
      tags:
      - "meta"
      summary: "API index"
      description: "A small discovery document listing the version and available endpoints."
      responses:
        "200":
          description: "The API index."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiIndex"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/openapi.json:
    get:
      tags:
      - "meta"
      summary: "This OpenAPI document"
      responses:
        "200":
          description: "The OpenAPI 3 description of this API."
          content:
            application/json:
              schema:
                type: "object"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/health:
    get:
      tags:
      - "meta"
      summary: "Liveness and a cheap snapshot summary"
      responses:
        "200":
          description: "Health summary."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
              example:
                ok: true
                itemCount: 4
                snapshotGeneratedAt: "2025-06-27T06:13:20.000Z"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: "Snapshot not loaded yet."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/search:
    get:
      tags:
      - "search"
      summary: "Relevance search (top-N, not paginated)"
      description: "Returns up to a hard ceiling of 25 best matches as compact item DTOs. For browsing all items with pagination, use GET /api/v1/items instead."
      parameters:
      -
        name: "q"
        in: "query"
        required: true
        description: "Search query. Accepts the app's full grammar (field:value, cap:key>n, AND/OR/parens) as well as a casual phrase like \"M3 bolt\". Max 200 characters."
        schema:
          type: "string"
          maxLength: 200
        example: "M3 bolt"
      -
        name: "limit"
        in: "query"
        required: false
        description: "Max results, clamped to [1, 25]. Defaults to 5."
        schema:
          type: "integer"
          minimum: 1
          maximum: 25
          default: 5
      responses:
        "200":
          description: "The matches."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
        "400":
          description: "Bad request — missing or invalid parameter."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: "Snapshot not loaded yet."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/where:
    get:
      tags:
      - "search"
      summary: "\"Where is X?\" — matches with per-location breakdown + a spoken sentence"
      parameters:
      -
        name: "q"
        in: "query"
        required: true
        description: "Search query. Accepts the app's full grammar (field:value, cap:key>n, AND/OR/parens) as well as a casual phrase like \"M3 bolt\". Max 200 characters."
        schema:
          type: "string"
          maxLength: 200
        example: "M3 bolt"
      responses:
        "200":
          description: "The enriched answer."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhereIsResult"
        "400":
          description: "Bad request — missing or invalid parameter."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: "Snapshot not loaded yet."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/items:
    get:
      tags:
      - "items"
      summary: "Browse items (paginated)"
      parameters:
      -
        name: "limit"
        in: "query"
        required: false
        description: "Page size, clamped to [1, 100]. Defaults to 50."
        schema:
          type: "integer"
          minimum: 1
          maximum: 100
          default: 50
      -
        name: "offset"
        in: "query"
        required: false
        description: "Zero-based row offset. Defaults to 0."
        schema:
          type: "integer"
          minimum: 0
          default: 0
      -
        name: "location"
        in: "query"
        required: false
        description: "Filter to items whose home location is this location id."
        schema:
          type: "string"
      -
        name: "category"
        in: "query"
        required: false
        description: "Filter to items in this category id."
        schema:
          type: "string"
      -
        name: "includeInactive"
        in: "query"
        required: false
        description: "Include soft-deleted items when \"true\". Defaults to active only."
        schema:
          type: "boolean"
          default: false
      responses:
        "200":
          description: "A page of results."
          content:
            application/json:
              schema:
                type: "object"
                required:
                - "data"
                - "pagination"
                properties:
                  data:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ItemSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: "Missing or invalid bearer token."
          headers:
            WWW-Authenticate:
              schema:
                type: "string"
              description: "Bearer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: "Rate limit exceeded for this client."
          headers:
            Retry-After:
              schema:
                type: "integer"
              description: "Seconds to wait."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: "Snapshot not loaded yet."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/items/{id}:
    get:
      tags:
      - "items"
      summary: "Look up one item by id (with placements and capabilities)"
      parameters:
      -
        name: "id"
        in: "path"
        required: true
        description: "The item id."
        schema:
