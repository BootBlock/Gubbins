<!doctype html>
<html lang="en-GB" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0f" />
    <meta
      name="description"
      content="Gubbins — local-first inventory tracking for electronics, 3D-printing supplies, tools, and general inventory."
    />
    <link rel="icon" type="image/svg+xml" href="/Gubbins/icons/gubbins.svg" />
    <!-- iOS ignores the web-manifest icons for "Add to Home Screen"; it uses this. -->
    <link rel="apple-touch-icon" href="/Gubbins/icons/apple-touch-icon.png" />

    <!--
      Cross-origin isolation bootstrap (spec §2.2.6). Kept in an external `'self'` file
      (not inline) so the Content-Security-Policy can forbid inline script entirely. See
      public/coi-bootstrap.js and src/csp.ts.
    -->
    <script src="/Gubbins/coi-bootstrap.js"></script>

    <title>Gubbins</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
