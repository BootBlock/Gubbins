name: Deploy to GitHub Pages

# Manual-only: this never runs on push. Publish a new version by opening the
# repo's "Actions" tab, selecting this workflow, and clicking "Run workflow".
# It builds the chosen branch (default: main) and deploys it to GitHub Pages.
on:
  workflow_dispatch:

# Permissions the deploy needs (least-privilege).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer run supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
